<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Privacy-first subscription tracker. Track recurring spending, get renewal alerts, export a clean tax report. 28 languages. Local-first, E2EE cloud sync optional.">
<title>leakd — See where your money is leaking.</title>
<style>
  /* Invisible page — user never sees this, it redirects instantly. */
  body { margin: 0; background: #0a0a0a; }
</style>
<script>
// ─── Leakd Router ───
// This page is the entry point (https://leakd.app/).
// It decides where to send the visitor:
//
//   ✅ Google Play app (TWA / standalone / PWA) → /app.html
//   ✅ Everyone else (browser, any device)      → /landing.html
//
// Detection runs SYNCHRONOUSLY before anything renders.
// If detection fails, we fall back to the landing page (safe default).

(function () {
  try {
    // ── 1. Explicit source parameter ──
    // The manifest.json start_url includes ?source=pwa, so Play Store
    // launches always carry this flag. This is the most reliable signal.
    var params = new URLSearchParams(location.search);
    var fromPwa = params.get('source') === 'pwa';

    // ── 2. Display mode detection ──
    // Standalone = installed PWA or TWA (Trusted Web Activity).
    // This covers home-screen installs on Android and iOS.
    var inStandalone = false;
    if (window.matchMedia) {
      inStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.matchMedia('(display-mode: minimal-ui)').matches;
    }
    // iOS Safari standalone mode (pre-PWA API)
    if (window.navigator.standalone === true) inStandalone = true;

    // ── 3. Android TWA / WebView detection ──
    // TWA runs inside a Chrome Custom Tab with a WebView-like context.
    // Some older TWA builds include "wv" in the UA string.
    var ua = navigator.userAgent || '';
    var isTwa = /\bTWA\b/i.test(ua);
    var isWebView = /\bwv\b/.test(ua);

    // ── 4. Android App referrer ──
    // When opening from an Android app, document.referrer may contain
    // the app's package URI.
    var fromAndroidApp = (document.referrer || '').indexOf('android-app://') === 0;

    // ── Decision ──
    var isPlayStoreApp = fromPwa || inStandalone || isTwa || isWebView || fromAndroidApp;

    if (isPlayStoreApp) {
      // Preserve any query params the manifest/shortcut passed
      var target = 'app.html' + location.search;
      location.replace(target);
    } else {
      // Everyone else → marketing landing page
      location.replace('landing.html');
    }
  } catch (e) {
    // If anything fails, safe fallback = landing page
    location.replace('landing.html');
  }
})();
</script>
</head>
<body>
<!-- This page is a router. The user is redirected before the body renders. -->
<noscript>
  <meta http-equiv="refresh" content="0;url=landing.html">
  <p>Redirecting… <a href="landing.html">Click here</a> if not redirected.</p>
</noscript>
</body>
</html>
